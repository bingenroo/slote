# Flutter CI: pub get, analyze, test (main app at root + component test apps)
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Bootstrap dependencies
        run: python3 cmd.py bootstrap

      - name: Analyze main app
        run: flutter analyze .

      - name: Analyze component packages
        run: |
          for dir in components/viewport components/rich_text components/draw components/theme components/shared; do
            if [ -d "$dir" ]; then
              echo "Analyzing $dir..."
              flutter analyze "$dir" || exit 1
            fi
          done

      - name: Run all tests
        run: python3 cmd.py test
